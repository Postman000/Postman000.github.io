baseURL: "https://postman000.github.io/"
languageCode: "zh-cn"
defaultContentLanguage: "zh-cn"
title: Postman000's Blog
paginate: 5
theme: ["PaperMod"]

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Postman000's Blog
  description: "记录学习、分享技术、沉淀思考"
  keywords: [Blog, PaperMod, Hugo]
  author: Postman000
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  label:
    text: "Home"
    iconHeight: 35

  profileMode:
    enabled: true
    title: "Postman000"
    subtitle: "保持好奇，持续学习 🚀"
    imageUrl: "https://github.com/Postman000.png"
    imageWidth: 120
    imageHeight: 120
    imageTitle: Postman000
    buttons:
      - name: 📚 文章
        url: posts
      - name: 🏷️ 标签
        url: tags
      - name: 📂 归档
        url: archives

  socialIcons:
    - name: github
      url: "https://github.com/Postman000"
    - name: email
      url: "mailto:mao1915771@163.com"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: search
      name: 🔍 搜索
      url: /search/
      weight: 5
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 30
    - identifier: github
      name: GitHub
      url: https://github.com/Postman000
      weight: 40
    - identifier: about
      name: 关于我
      url: /about/
      weight: 50

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    lineNos: true
    lineNumbersInTable: true
